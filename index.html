<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GlowGarden – Medium World</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #87c27b;
    font-family: system-ui, sans-serif;
  }

  #topBar {
    height: 48px;
    background: linear-gradient(90deg,#4f7b3a,#365427);
    color: #f5f5ff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    font-size: 13px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }

  #worldLabel {
    font-weight: 600;
  }

  #themeButtons button {
    margin-left: 4px;
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.2);
    color: #f5f5ff;
    font-size: 11px;
    cursor: pointer;
  }

  #themeButtons button:hover {
    background: rgba(255,255,255,0.15);
  }

  #soundToggle {
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.2);
    cursor: pointer;
    font-size: 11px;
  }

  #main {
    position: relative;
    width: 100vw;
    height: calc(100vh - 48px);
    overflow: hidden;
    background: #7fb86f;
  }

  /* Medium world */
  #world {
    position: absolute;
    width: 2000px;
    height: 2000px;
    background:
      radial-gradient(circle at 20% 20%, rgba(255,255,255,0.25) 0, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(255,255,255,0.2) 0, transparent 45%),
      repeating-linear-gradient(45deg,#7fb86f 0,#7fb86f 16px,#76ad66 16px,#76ad66 32px);
    border-radius: 40px;
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
    cursor: grab;
  }

  #world.dragging {
    cursor: grabbing;
  }

  /* Plaza */
  #plaza {
    position: absolute;
    left: 900px;
    top: 900px;
    width: 260px;
    height: 260px;
    background: radial-gradient(circle,#f5e0b8,#d9a96a);
    border-radius: 40px;
    box-shadow: 0 0 30px rgba(0,0,0,0.4);
    border: 4px solid #c28b4a;
  }

  /* Garden */
  #garden {
    position: absolute;
    left: 930px;
    top: 1030px;
    width: 256px;
    height: 256px;
    display: grid;
    grid-template-columns: repeat(4,64px);
    grid-template-rows: repeat(4,64px);
    gap: 4px;
  }

  .tile {
    width: 64px;
    height: 64px;
    background: #5b3b24;
    border-radius: 6px;
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.15);
    cursor: pointer;
    position: relative;
  }

  .plant {
    position: absolute;
    left: 18px;
    top: 18px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
  }

  .stage1 { background:#7fd37f; box-shadow:0 0 8px #7fd37f; }
  .stage2 { background:#ffdf80; box-shadow:0 0 8px #ffdf80; }
  .stage3 { background:#ff8fa3; box-shadow:0 0 8px #ff8fa3; }
  .stage4 { background:#c9a7ff; box-shadow:0 0 8px #c9a7ff; }

  /* Stands */
  .stand {
    position: absolute;
    width: 150px;
    height: 100px;
    border-radius: 14px;
    box-shadow: 0 10px 22px rgba(0,0,0,0.5);
    cursor: pointer;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-size: 13px;
    color: #fff;
    font-weight: 600;
    padding-bottom: 6px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
  }

  #standCute {
    left: 820px;
    top: 840px;
    background: linear-gradient(180deg,#ffe3ec,#ff8fa3);
  }

  #standMagic {
    left: 1120px;
    top: 840px;
    background: radial-gradient(circle,#f5ecff,#7f5fff);
  }

  #standCosmic {
    left: 820px;
    top: 1040px;
    background: radial-gradient(circle,#f0fbff,#3a7bbf);
  }

  #standPixel {
    left: 1120px;
    top: 1040px;
    background: repeating-linear-gradient(90deg,#fff2b3 0,#fff2b3 8px,#ffd966 8px,#ffd966 16px);
  }

  /* Avatar (base) */
  #avatar {
    position: absolute;
    width: 40px;
    height: 40px;
    left: 1030px;
    top: 980px;
    transition: transform 0.05s linear;
  }

  /* Cute avatar */
  .avatar-cute {
    border-radius: 50%;
    background: radial-gradient(circle,#ffe3ec,#ff8fa3);
    box-shadow: 0 0 12px #ffb7c5;
  }

  /* Magical avatar */
  .avatar-magical {
    border-radius: 50%;
    background: radial-gradient(circle,#e5d4ff,#7f5fff);
    box-shadow: 0 0 14px #c9a7ff;
  }

  /* Cosmic avatar */
  .avatar-cosmic {
    border-radius: 50%;
    background: radial-gradient(circle,#e0f6ff,#3a7bbf);
    box-shadow: 0 0 14px #7fd0ff;
  }

  /* Pixel avatar */
  .avatar-pixel {
    width: 32px;
    height: 32px;
    image-rendering: pixelated;
    background:
      linear-gradient(#f4d7b5 0 8px,#f4d7b5 8px 16px,#c28b4a 16px 24px,#3b2614 24px 32px);
    box-shadow: 0 0 8px #ffd966;
  }

  /* Decorations */
  .decoration {
    position: absolute;
    width: 26px;
    height: 26px;
    border-radius: 50%;
    pointer-events: none;
  }

  .dec-tree { background: radial-gradient(circle,#4f7b3a,#2f4f23); box-shadow:0 0 8px rgba(0,0,0,0.4); }
  .dec-flower { background: radial-gradient(circle,#fff,#ff8fa3); box-shadow:0 0 8px #ff8fa3; }
  .dec-stone { background: radial-gradient(circle,#ddd,#999); box-shadow:0 0 6px rgba(0,0,0,0.4); }

  /* Task board button */
  #taskBoardButton {
    position: absolute;
    left: 16px;
    top: 16px;
    width: 60px;
    height: 60px;
    background: #c28b4a;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #3b2614;
    font-weight: 700;
    font-size: 11px;
    text-align: center;
  }

  /* Task modal */
  #taskModalBackdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
  }

  #taskModal {
    width: 260px;
    background: #f7f0e2;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    padding: 10px;
    color: #3b2614;
    font-size: 13px;
  }

  #taskModal h3 {
    margin: 0 0 6px 0;
    font-size: 14px;
  }

  #taskModal ul {
    list-style: none;
    padding-left: 0;
    margin: 0 0 8px 0;
  }

  #taskModal li {
    margin-bottom: 4px;
  }

  #taskModal li.done {
    text-decoration: line-through;
    color: #8b7b66;
  }

  #closeTasks {
    display: inline-block;
    margin-top: 4px;
    padding: 3px 8px;
    border-radius: 6px;
    border: 1px solid #c28b4a;
    background: #e3c48f;
    cursor: pointer;
    font-size: 12px;
  }

  /* Decorations panel */
  #decorPanel {
    position: absolute;
    right: 16px;
    bottom: 16px;
    background: rgba(0,0,0,0.4);
    border-radius: 10px;
    padding: 6px;
    color: #f5f5ff;
    font-size: 11px;
  }

  #decorPanel button {
    margin: 2px 0;
    width: 100%;
    padding: 3px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.3);
    color: #f5f5ff;
    cursor: pointer;
  }

  #decorPanel button:hover {
    background: rgba(255,255,255,0.15);
  }
</style>
</head>
<body>

<div id="topBar">
  <span id="worldLabel">GlowGarden – Cute World</span>
  <div id="themeButtons">
    <button data-theme="cute">Cute</button>
    <button data-theme="magical">Magical</button>
    <button data-theme="cosmic">Cosmic</button>
    <button data-theme="pixel">Pixel</button>
  </div>
  <button id="soundToggle">Sound: Off</button>
</div>

<div id="main">
  <div id="world">
    <div id="plaza"></div>
    <div id="garden"></div>

    <div id="standCute" class="stand">Cute Stand</div>
    <div id="standMagic" class="stand">Magic Stand</div>
    <div id="standCosmic" class="stand">Cosmic Stand</div>
    <div id="standPixel" class="stand">Pixel Stand</div>

    <div id="avatar" class="avatar-cute"></div>

    <div id="taskBoardButton">Tasks</div>
  </div>

  <div id="taskModalBackdrop">
    <div id="taskModal">
      <h3>Garden Tasks</h3>
      <ul>
        <li data-id="plant3">Plant 3 seeds</li>
        <li data-id="visitCute">Visit Cute Stand</li>
        <li data-id="visitMagic">Visit Magic Stand</li>
        <li data-id="visitCosmic">Visit Cosmic Stand</li>
        <li data-id="visitPixel">Visit Pixel Stand</li>
      </ul>
      <button id="closeTasks">Close</button>
    </div>
  </div>

  <div id="decorPanel">
    <div style="margin-bottom:4px;">Decorations</div>
    <button data-dec="tree">Place Tree</button>
    <button data-dec="flower">Place Flower</button>
    <button data-dec="stone">Place Stone</button>
    <div style="margin-top:4px;">Click in world to place.</div>
  </div>
</div>

<script>
/* ---------- Drag-to-scroll camera ---------- */
const world = document.getElementById("world");
const main = document.getElementById("main");

let isDragging = false;
let startX = 0, startY = 0;
let worldX = -500, worldY = -500; // initial offset

function applyWorldTransform() {
  world.style.transform = `translate(${worldX}px, ${worldY}px)`;
}
applyWorldTransform();

main.addEventListener("mousedown", e => {
  isDragging = true;
  world.classList.add("dragging");
  startX = e.clientX - worldX;
  startY = e.clientY - worldY;
});

window.addEventListener("mousemove", e => {
  if (!isDragging) return;
  worldX = e.clientX - startX;
  worldY = e.clientY - startY;
  applyWorldTransform();
});

window.addEventListener("mouseup", () => {
  isDragging = false;
  world.classList.remove("dragging");
});

/* Touch support */
main.addEventListener("touchstart", e => {
  const t = e.touches[0];
  isDragging = true;
  world.classList.add("dragging");
  startX = t.clientX - worldX;
  startY = t.clientY - worldY;
});

main.addEventListener("touchmove", e => {
  if (!isDragging) return;
  const t = e.touches[0];
  worldX = t.clientX - startX;
  worldY = t.clientY - startY;
  applyWorldTransform();
});

main.addEventListener("touchend", () => {
  isDragging = false;
  world.classList.remove("dragging");
});

/* ---------- Avatar movement (smooth) ---------- */
const avatar = document.getElementById("avatar");
let avatarX = 1030;
let avatarY = 980;
const avatarSpeed = 3;
const keys = {};

document.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

function updateAvatar() {
  let dx = 0, dy = 0;
  if (keys["w"] || keys["arrowup"]) dy -= avatarSpeed;
  if (keys["s"] || keys["arrowdown"]) dy += avatarSpeed;
  if (keys["a"] || keys["arrowleft"]) dx -= avatarSpeed;
  if (keys["d"] || keys["arrowright"]) dx += avatarSpeed;

  avatarX += dx;
  avatarY += dy;

  // clamp inside world
  avatarX = Math.max(0, Math.min(1960, avatarX));
  avatarY = Math.max(0, Math.min(1960, avatarY));

  avatar.style.left = avatarX + "px";
  avatar.style.top = avatarY + "px";
}

function gameLoop() {
  updateAvatar();
  requestAnimationFrame(gameLoop);
}
gameLoop();

/* ---------- Garden + plant growth ---------- */
const garden = document.getElementById("garden");
let plantedCount = 0;

for (let i = 0; i < 16; i++) {
  const tile = document.createElement("div");
  tile.className = "tile";
  tile.dataset.stage = 0;

  tile.onclick = e => {
    e.stopPropagation();
    let stage = Number(tile.dataset.stage);
    if (stage < 4) {
      stage++;
      if (stage === 1) plantedCount++;
      tile.dataset.stage = stage;
      tile.innerHTML = "";
      const plant = document.createElement("div");
      plant.className = "plant stage" + stage;
      tile.appendChild(plant);
      checkTasks();
      playChime();
    }
  };

  garden.appendChild(tile);
}

/* ---------- Stands + tasks ---------- */
const taskItems = document.querySelectorAll("#taskModal li");

function markTaskDone(id) {
  taskItems.forEach(li => {
    if (li.dataset.id === id) li.classList.add("done");
  });
}

function checkTasks() {
  if (plantedCount >= 3) markTaskDone("plant3");
}

document.getElementById("standCute").onclick = e => {
  e.stopPropagation();
  alert("You visited the Cute Stand!");
  markTaskDone("visitCute");
  playChime();
};

document.getElementById("standMagic").onclick = e => {
  e.stopPropagation();
  alert("You visited the Magic Stand!");
  markTaskDone("visitMagic");
  playChime();
};

document.getElementById("standCosmic").onclick = e => {
  e.stopPropagation();
  alert("You visited the Cosmic Stand!");
  markTaskDone("visitCosmic");
  playChime();
};

document.getElementById("standPixel").onclick = e => {
  e.stopPropagation();
  alert("You visited the Pixel Stand!");
  markTaskDone("visitPixel");
  playChime();
};

/* ---------- Task board modal ---------- */
const taskBoardButton = document.getElementById("taskBoardButton");
const taskModalBackdrop = document.getElementById("taskModalBackdrop");
const closeTasks = document.getElementById("closeTasks");

taskBoardButton.onclick = e => {
  e.stopPropagation();
  taskModalBackdrop.style.display = "flex";
};

closeTasks.onclick = () => {
  taskModalBackdrop.style.display = "none";
};

taskModalBackdrop.addEventListener("click", e => {
  if (e.target === taskModalBackdrop) {
    taskModalBackdrop.style.display = "none";
  }
});

/* ---------- Decorations ---------- */
let currentDecoration = null;

document.querySelectorAll("#decorPanel button").forEach(btn => {
  btn.addEventListener("click", () => {
    currentDecoration = btn.dataset.dec;
  });
});

world.addEventListener("click", e => {
  if (!currentDecoration) return;
  const rect = world.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const dec = document.createElement("div");
  dec.classList.add("decoration");
  if (currentDecoration === "tree") dec.classList.add("dec-tree");
  if (currentDecoration === "flower") dec.classList.add("dec-flower");
  if (currentDecoration === "stone") dec.classList.add("dec-stone");
  dec.style.left = (x - 13) + "px";
  dec.style.top = (y - 13) + "px";
  world.appendChild(dec);
  playChime();
});

/* ---------- Themes + avatar styles ---------- */
const worldLabel = document.getElementById("worldLabel");

function setAvatarClass(cls) {
  avatar.className = "";
  avatar.id = "avatar";
  avatar.classList.add(cls);
}

function setTheme(theme) {
  if (theme === "cute") {
    world.style.background =
      "radial-gradient(circle at 20% 20%, rgba(255,255,255,0.25) 0, transparent 40%)," +
      "radial-gradient(circle at 80% 70%, rgba(255,255,255,0.2) 0, transparent 45%)," +
      "repeating-linear-gradient(45deg,#ffcfe0 0,#ffcfe0 16px,#ffb7c5 16px,#ffb7c5 32px)";
    worldLabel.textContent = "GlowGarden – Cute World";
    setAvatarClass("avatar-cute");
  } else if (theme === "magical") {
    world.style.background =
      "radial-gradient(circle at 20% 20%, rgba(255,255,255,0.25) 0, transparent 40%)," +
      "radial-gradient(circle at 80% 70%, rgba(200,180,255,0.3) 0, transparent 45%)," +
      "repeating-linear-gradient(45deg,#6f5f9f 0,#6f5f9f 16px,#5b4a8a 16px,#5b4a8a 32px)";
    worldLabel.textContent = "GlowGarden – Magical World";
    setAvatarClass("avatar-magical");
  } else if (theme === "cosmic") {
    world.style.background =
      "radial-gradient(circle at 20% 20%, rgba(255,255,255,0.2) 0, transparent 40%)," +
      "radial-gradient(circle at 80% 70%, rgba(150,200,255,0.3) 0, transparent 45%)," +
      "repeating-linear-gradient(45deg,#163a5c 0,#163a5c 16px,#0b1f33 16px,#0b1f33 32px)";
    worldLabel.textContent = "GlowGarden – Cosmic World";
    setAvatarClass("avatar-cosmic");
  } else if (theme === "pixel") {
    world.style.background =
      "repeating-linear-gradient(45deg,#1f1f1f 0,#1f1f1f 16px,#151515 16px,#151515 32px)";
    worldLabel.textContent = "GlowGarden – Pixel World";
    setAvatarClass("avatar-pixel");
  }
}

document.querySelectorAll("#themeButtons button").forEach(btn => {
  btn.addEventListener("click", () => setTheme(btn.dataset.theme));
});

setTheme("cute");

/* ---------- Sound (simple chime) ---------- */
let soundOn = false;
const soundToggle = document.getElementById("soundToggle");

soundToggle.onclick = () => {
  soundOn = !soundOn;
  soundToggle.textContent = "Sound: " + (soundOn ? "On" : "Off");
};

function playChime() {
  if (!soundOn) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.25);
  } catch (e) {}
}
</script>

</body>
</html>
