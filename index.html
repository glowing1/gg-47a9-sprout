<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GlowGarden</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: radial-gradient(circle at top, #ffe6ff, #1b1230);
        font-family: system-ui, sans-serif;
        color: #ffeeff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        text-align: center;
        padding-top: 20px;
    }

    #container {
        background: rgba(20, 12, 40, 0.9);
        padding: 20px;
        border-radius: 20px;
        width: 90%;
        max-width: 350px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    }

    h1 {
        margin-top: 0;
        font-size: 32px;
    }

    #plant {
        font-size: 60px;
        margin: 15px 0;
    }

    #stats {
        margin: 10px 0 20px 0;
        font-size: 18px;
        line-height: 1.6;
    }

    .btn-row {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
    }

    button {
        flex: 1;
        padding: 10px 14px;
        border-radius: 10px;
        border: none;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        color: #1b1230;
    }

    #btnWater { background: #99d6ff; }
    #btnSun { background: #ffe066; }
    #btnReset {
        background: #ffb3c6;
        width: 100%;
        margin-top: 10px;
    }
</style>
</head>

<body>
<div id="container">
    <h1>GlowGarden</h1>

    <div id="plant">🌱</div>

    <div id="stats">
        Glow: <span id="glow">0</span>/10<br>
        Water: <span id="water">0</span><br>
        Sun: <span id="sun">0</span>
    </div>

    <div class="btn-row">
        <button id="btnWater">💧</button>
        <button id="btnSun">☀️</button>
    </div>

    <button id="btnReset">Reset</button>
</div>

<script>
const MAX = 10;

let state = {
    glow: 0,
    water: 0,
    sun: 0
};

const glowEl = document.getElementById("glow");
const waterEl = document.getElementById("water");
const sunEl = document.getElementById("sun");
const plantEl = document.getElementById("plant");

function updatePlant() {
    let g = state.glow;

    if (g <= 2) plantEl.textContent = "🌱";
    else if (g <= 4) plantEl.textContent = "🌿";
    else if (g <= 6) plantEl.textContent = "🌳";
    else if (g <= 8) plantEl.textContent = "🌸";
    else plantEl.textContent = "🌺";
}

function render() {
    glowEl.textContent = state.glow;
    waterEl.textContent = state.water;
    sunEl.textContent = state.sun;
    updatePlant();
}

document.getElementById("btnWater").onclick = () => {
    if (state.glow < MAX) {
        state.glow++;
        state.water++;
        render();
    }
};

document.getElementById("btnSun").onclick = () => {
    if (state.glow < MAX) {
        state.glow++;
        state.sun++;
        render();
    }
};

document.getElementById("btnReset").onclick = () => {
    state = { glow: 0, water: 0, sun: 0 };
    render();
};

render();
</script>

</body>
</html>
