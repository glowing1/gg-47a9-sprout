<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GlowGarden – Creatures & Worlds</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #87c27b;
    font-family: system-ui, sans-serif;
  }

  #topBar {
    height: 48px;
    background: linear-gradient(90deg,#4f7b3a,#365427);
    color: #f5f5ff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    font-size: 13px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }

  #worldLabel {
    font-weight: 600;
  }

  #themeButtons button {
    margin-left: 4px;
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.2);
    color: #f5f5ff;
    font-size: 11px;
    cursor: pointer;
  }

  #themeButtons button:hover {
    background: rgba(255,255,255,0.15);
  }

  #soundToggle {
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.2);
    cursor: pointer;
    font-size: 11px;
  }

  #main {
    position: relative;
    width: 100vw;
    height: calc(100vh - 48px);
    overflow: hidden;
    background: #7fb86f;
  }

  /* Medium world base */
  #world {
    position: absolute;
    width: 2000px;
    height: 2000px;
    border-radius: 40px;
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
    cursor: grab;
  }

  #world.dragging {
    cursor: grabbing;
  }

  /* Plaza */
  #plaza {
    position: absolute;
    left: 900px;
    top: 900px;
    width: 260px;
    height: 260px;
    background: radial-gradient(circle,#f5e0b8,#d9a96a);
    border-radius: 40px;
    box-shadow: 0 0 30px rgba(0,0,0,0.4);
    border: 4px solid #c28b4a;
  }

  /* Garden area */
  #garden {
    position: absolute;
    left: 930px;
    top: 1030px;
    width: 256px;
    height: 256px;
    display: grid;
    grid-template-columns: repeat(4,64px);
    grid-template-rows: repeat(4,64px);
    gap: 4px;
  }

  .tile {
    width: 64px;
    height: 64px;
    background: #5b3b24;
    border-radius: 6px;
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.15);
    cursor: pointer;
    position: relative;
  }

  .plant {
    position: absolute;
    left: 18px;
    top: 18px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
  }

  .stage1 { background:#7fd37f; box-shadow:0 0 8px #7fd37f; }
  .stage2 { background:#ffdf80; box-shadow:0 0 8px #ffdf80; }
  .stage3 { background:#ff8fa3; box-shadow:0 0 8px #ff8fa3; }
  .stage4 { background:#c9a7ff; box-shadow:0 0 8px #c9a7ff; }

  /* Stands */
  .stand {
    position: absolute;
    width: 150px;
    height: 100px;
    border-radius: 14px;
    box-shadow: 0 10px 22px rgba(0,0,0,0.5);
    cursor: pointer;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-size: 13px;
    color: #fff;
    font-weight: 600;
    padding-bottom: 6px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
  }

  #standCute {
    left: 820px;
    top: 840px;
    background: linear-gradient(180deg,#ffe3ec,#ff8fa3);
  }

  #standMagic {
    left: 1120px;
    top: 840px;
    background: radial-gradient(circle,#f5ecff,#7f5fff);
  }

  #standCosmic {
    left: 820px;
    top: 1040px;
    background: radial-gradient(circle,#f0fbff,#3a7bbf);
  }

  #standPixel {
    left: 1120px;
    top: 1040px;
    background: repeating-linear-gradient(90deg,#fff2b3 0,#fff2b3 8px,#ffd966 8px,#ffd966 16px);
  }

  /* Avatar container (for positioning) */
  #avatar {
    position: absolute;
    width: 60px;
    height: 60px;
    left: 1020px;
    top: 970px;
  }

  /* Shared creature base */
  .creature {
    position: relative;
    width: 100%;
    height: 100%;
  }

  /* ---------- Cute World Creature: Pufflet ---------- */
  .creature-cute .body {
    position: absolute;
    width: 52px;
    height: 48px;
    left: 4px;
    top: 8px;
    background: radial-gradient(circle at 30% 20%, #fff, #ffb7c5);
    border-radius: 50px;
    box-shadow: 0 0 10px #ffb7c5;
  }

  .creature-cute .ear-left,
  .creature-cute .ear-right {
    position: absolute;
    width: 16px;
    height: 24px;
    background: #ffe3ec;
    border-radius: 16px;
    box-shadow: 0 0 4px rgba(0,0,0,0.1);
  }

  .creature-cute .ear-left {
    left: 8px;
    top: 0;
  }

  .creature-cute .ear-right {
    right: 8px;
    top: 0;
  }

  .creature-cute .eye-left,
  .creature-cute .eye-right {
    position: absolute;
    width: 10px;
    height: 12px;
    background: #2b1b1b;
    border-radius: 50%;
    top: 22px;
  }

  .creature-cute .eye-left {
    left: 18px;
  }

  .creature-cute .eye-right {
    right: 18px;
  }

  .creature-cute .eye-left::after,
  .creature-cute .eye-right::after {
    content: "";
    position: absolute;
    width: 4px;
    height: 4px;
    background: #fff;
    border-radius: 50%;
    top: 2px;
    left: 3px;
  }

  .creature-cute .cheek-left,
  .creature-cute .cheek-right {
    position: absolute;
    width: 8px;
    height: 6px;
    background: #ff8fa3;
    border-radius: 50%;
    top: 34px;
  }

  .creature-cute .cheek-left {
    left: 14px;
  }

  .creature-cute .cheek-right {
    right: 14px;
  }

  .creature-cute .feet {
    position: absolute;
    width: 32px;
    height: 8px;
    left: 14px;
    bottom: 4px;
    display: flex;
    justify-content: space-between;
  }

  .creature-cute .feet::before,
  .creature-cute .feet::after {
    content: "";
    width: 10px;
    height: 8px;
    background: #c28b4a;
    border-radius: 10px 10px 4px 4px;
  }

  .creature-cute {
    animation: cuteBounce 1.8s infinite ease-in-out, cuteSparkle 3s infinite ease-in-out;
  }

  /* ---------- Magical World Creature: Faelight Sprite ---------- */
  .creature-magical .body {
    position: absolute;
    width: 46px;
    height: 46px;
    left: 7px;
    top: 10px;
    background: radial-gradient(circle, #f7f0ff, #b28cff);
    border-radius: 50%;
    box-shadow: 0 0 16px #c9a7ff;
  }

  .creature-magical .wing-left,
  .creature-magical .wing-right {
    position: absolute;
    width: 22px;
    height: 30px;
    background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(200,180,255,0.1));
    border-radius: 50%;
    top: 16px;
    filter: blur(0.5px);
  }

  .creature-magical .wing-left {
    left: -6px;
  }

  .creature-magical .wing-right {
    right: -6px;
  }

  .creature-magical .eye-left,
  .creature-magical .eye-right {
    position: absolute;
    width: 8px;
    height: 10px;
    background: #2b1b3b;
    border-radius: 50%;
    top: 22px;
  }

  .creature-magical .eye-left {
    left: 20px;
  }

  .creature-magical .eye-right {
    right: 20px;
  }

  .creature-magical .eye-left::after,
  .creature-magical .eye-right::after {
    content: "";
    position: absolute;
    width: 3px;
    height: 3px;
    background: #fff;
    border-radius: 50%;
    top: 2px;
    left: 3px;
  }

  .creature-magical .sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 8px #fff;
    top: 8px;
    left: 40px;
    opacity: 0.8;
  }

  .creature-magical {
    animation: magicalPulse 2.2s infinite ease-in-out, magicalGlow 3.5s infinite ease-in-out;
  }

  /* ---------- Cosmic World Creature: Starling ---------- */
  .creature-cosmic .body {
    position: absolute;
    width: 50px;
    height: 50px;
    left: 5px;
    top: 8px;
    background: radial-gradient(circle at 30% 20%, #e0f6ff, #163a5c);
    border-radius: 50%;
    box-shadow: 0 0 18px #7fd0ff;
  }

  .creature-cosmic .core {
    position: absolute;
    width: 20px;
    height: 20px;
    left: 20px;
    top: 20px;
    background: radial-gradient(circle, #fff, #7fd0ff);
    border-radius: 50%;
    box-shadow: 0 0 10px #7fd0ff;
  }

  .creature-cosmic .orbit {
    position: absolute;
    width: 60px;
    height: 60px;
    left: 0;
    top: 4px;
    border-radius: 50%;
    border: 1px dashed rgba(127,208,255,0.6);
    box-sizing: border-box;
    animation: orbitSpin 4s linear infinite;
  }

  .creature-cosmic .orbit::before {
    content: "";
    position: absolute;
    width: 6px;
    height: 6px;
    background: #7fd0ff;
    border-radius: 50%;
    top: -3px;
    left: 27px;
    box-shadow: 0 0 8px #7fd0ff;
  }

  .creature-cosmic {
    animation: cosmicDrift 2.6s infinite ease-in-out, cosmicShimmer 2s infinite ease-in-out;
  }

  @keyframes orbitSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* ---------- Pixel World Creature: Bitling ---------- */
  .creature-pixel {
    width: 48px;
    height: 48px;
    margin: 6px;
    position: relative;
    image-rendering: pixelated;
    animation: pixelFlicker 0.9s infinite steps(2);
  }

  .creature-pixel .pixel-body {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(#f4d7b5 0 12px,#f4d7b5 12px 24px,#c28b4a 24px 36px,#3b2614 36px 48px);
  }

  .creature-pixel .eye-left,
  .creature-pixel .eye-right {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #2b1b1b;
    top: 14px;
  }

  .creature-pixel .eye-left {
    left: 12px;
  }

  .creature-pixel .eye-right {
    right: 12px;
  }

  .creature-pixel .eye-left::after,
  .creature-pixel .eye-right::after {
    content: "";
    position: absolute;
    width: 2px;
    height: 2px;
    background: #fff;
    top: 1px;
    left: 1px;
  }

  .creature-pixel .tail {
    position: absolute;
    width: 8px;
    height: 16px;
    right: -6px;
    top: 24px;
    background: #3b2614;
  }

  /* Decorations base */
  .decoration {
    position: absolute;
    pointer-events: none;
  }

  /* Cute decorations */
  .cute-path {
    width: 40px;
    height: 40px;
    background: #ffd6e8;
    border-radius: 10px;
    box-shadow: 0 0 6px #ffb7c5;
  }

  .cute-fence {
    width: 50px;
    height: 20px;
    background: #ffe3ec;
    border: 2px solid #ff8fa3;
    border-radius: 6px;
  }

  .cute-pond {
    width: 90px;
    height: 70px;
    background: radial-gradient(circle at 30% 20%, #fff, #b3eaff);
    border-radius: 60% 50% 55% 65%;
    box-shadow: 0 0 14px #a0e0ff;
  }

  .cute-tree {
    width: 50px;
    height: 70px;
    background: #ffb7c5;
    border-radius: 30px 30px 20px 20px;
    box-shadow: 0 0 10px #ff8fa3;
  }

  /* Magical decorations */
  .magical-path {
    width: 40px;
    height: 40px;
    background: #c9a7ff;
    border-radius: 10px;
    box-shadow: 0 0 10px #b28cff;
  }

  .magical-fence {
    width: 50px;
    height: 20px;
    background: #e5d4ff;
    border: 2px solid #7f5fff;
    border-radius: 6px;
  }

  .magical-pond {
    width: 90px;
    height: 70px;
    background: radial-gradient(circle at 30% 20%, #fff, #a0c0ff);
    border-radius: 55% 60% 50% 65%;
    box-shadow: 0 0 16px #7f5fff;
  }

  .magical-tree {
    width: 50px;
    height: 70px;
    background: #d9c2ff;
    border-radius: 30px 30px 20px 20px;
    box-shadow: 0 0 12px #b28cff;
  }

  /* Cosmic decorations */
  .cosmic-path {
    width: 40px;
    height: 40px;
    background: #1b2a40;
    border-radius: 10px;
    box-shadow: 0 0 10px #3a7bbf;
  }

  .cosmic-fence {
    width: 50px;
    height: 20px;
    background: #0b1f33;
    border: 2px solid #3a7bbf;
    border-radius: 6px;
  }

  .cosmic-pond {
    width: 90px;
    height: 70px;
    background: radial-gradient(circle at 30% 20%, #e0f6ff, #163a5c);
    border-radius: 60% 55% 50% 65%;
    box-shadow: 0 0 18px #7fd0ff;
  }

  .cosmic-tree {
    width: 50px;
    height: 70px;
    background: linear-gradient(#163a5c,#0b1f33);
    border-radius: 30px 30px 20px 20px;
    box-shadow: 0 0 14px #3a7bbf;
  }

  /* Pixel decorations */
  .pixel-path {
    width: 40px;
    height: 40px;
    background: repeating-linear-gradient(
      0deg,
      #d9d9d9 0 8px,
      #bfbfbf 8px 16px
    );
    image-rendering: pixelated;
  }

  .pixel-fence {
    width: 50px;
    height: 20px;
    background: repeating-linear-gradient(
      90deg,
      #fff2b3 0 8px,
      #ffd966 8px 16px
    );
    image-rendering: pixelated;
  }

  .pixel-pond {
    width: 90px;
    height: 70px;
    background: repeating-linear-gradient(
      0deg,
      #66ccff 0 8px,
      #3399ff 8px 16px
    );
    border-radius: 0;
    image-rendering: pixelated;
  }

  .pixel-tree {
    width: 50px;
    height: 70px;
    background: repeating-linear-gradient(
      0deg,
      #4f7b3a 0 8px,
      #2f4f23 8px 16px
    );
    image-rendering: pixelated;
  }

  /* Decoration animations */
  @keyframes cuteBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  @keyframes cuteSparkle {
    0% { box-shadow: 0 0 6px #ffb7c5; }
    50% { box-shadow: 0 0 12px #ffe3ec; }
    100% { box-shadow: 0 0 6px #ffb7c5; }
  }

  @keyframes magicalPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  @keyframes magicalGlow {
    0% { box-shadow: 0 0 10px #b28cff; }
    50% { box-shadow: 0 0 18px #d9c2ff; }
    100% { box-shadow: 0 0 10px #b28cff; }
  }

  @keyframes cosmicDrift {
    0% { transform: translateX(0); }
    50% { transform: translateX(6px); }
    100% { transform: translateX(0); }
  }

  @keyframes cosmicShimmer {
    0% { opacity: 0.9; }
    50% { opacity: 1; }
    100% { opacity: 0.9; }
  }

  @keyframes pixelFlicker {
    0% { filter: brightness(1); }
    50% { filter: brightness(1.3); }
    100% { filter: brightness(1); }
  }

  .cute-path, .cute-fence, .cute-pond, .cute-tree {
    animation: cuteBounce 2s infinite ease-in-out,
               cuteSparkle 3s infinite ease-in-out;
  }

  .magical-path, .magical-fence, .magical-pond, .magical-tree {
    animation: magicalPulse 2.5s infinite ease-in-out,
               magicalGlow 4s infinite ease-in-out;
  }

  .cosmic-path, .cosmic-fence, .cosmic-pond, .cosmic-tree {
    animation: cosmicDrift 3s infinite ease-in-out,
               cosmicShimmer 2s infinite ease-in-out;
  }

  .pixel-path, .pixel-fence, .pixel-pond, .pixel-tree {
    animation: pixelFlicker 0.8s infinite steps(2);
  }

  /* Task board button */
  #taskBoardButton {
    position: absolute;
    left: 16px;
    top: 16px;
    width: 60px;
    height: 60px;
    background: #c28b4a;
    border-radius: 8px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #3b2614;
    font-weight: 700;
    font-size: 11px;
    text-align: center;
  }

  /* Task modal */
  #taskModalBackdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
  }

  #taskModal {
    width: 260px;
    background: #f7f0e2;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    padding: 10px;
    color: #3b2614;
    font-size: 13px;
  }

  #taskModal h3 {
    margin: 0 0 6px 0;
    font-size: 14px;
  }

  #taskModal ul {
    list-style: none;
    padding-left: 0;
    margin: 0 0 8px 0;
  }

  #taskModal li {
    margin-bottom: 4px;
  }

  #taskModal li.done {
    text-decoration: line-through;
    color: #8b7b66;
  }

  #closeTasks {
    display: inline-block;
    margin-top: 4px;
    padding: 3px 8px;
    border-radius: 6px;
    border: 1px solid #c28b4a;
    background: #e3c48f;
    cursor: pointer;
    font-size: 12px;
  }

  /* Decorations panel */
  #decorPanel {
    position: absolute;
    right: 16px;
    bottom: 16px;
    background: rgba(0,0,0,0.4);
    border-radius: 10px;
    padding: 6px;
    color: #f5f5ff;
    font-size: 11px;
  }

  #decorPanel button {
    margin: 2px 0;
    width: 100%;
    padding: 3px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.3);
    color: #f5f5ff;
    cursor: pointer;
  }

  #decorPanel button:hover {
    background: rgba(255,255,255,0.15);
  }
</style>
</head>
<body>

<div id="topBar">
  <span id="worldLabel">GlowGarden – Cute World</span>
  <div id="themeButtons">
    <button data-theme="cute">Cute</button>
    <button data-theme="magical">Magical</button>
    <button data-theme="cosmic">Cosmic</button>
    <button data-theme="pixel">Pixel</button>
  </div>
  <button id="soundToggle">Sound: Off</button>
</div>

<div id="main">
  <div id="world">
    <div id="plaza"></div>
    <div id="garden"></div>

    <div id="standCute" class="stand">Cute Stand</div>
    <div id="standMagic" class="stand">Magic Stand</div>
    <div id="standCosmic" class="stand">Cosmic Stand</div>
    <div id="standPixel" class="stand">Pixel Stand</div>

    <div id="avatar">
      <!-- creature content injected by JS -->
    </div>

    <div id="taskBoardButton">Tasks</div>
  </div>

  <div id="taskModalBackdrop">
    <div id="taskModal">
      <h3>Garden Tasks</h3>
      <ul>
        <li data-id="plant3">Plant 3 seeds</li>
        <li data-id="visitCute">Visit Cute Stand</li>
        <li data-id="visitMagic">Visit Magic Stand</li>
        <li data-id="visitCosmic">Visit Cosmic Stand</li>
        <li data-id="visitPixel">Visit Pixel Stand</li>
      </ul>
      <button id="closeTasks">Close</button>
    </div>
  </div>

  <div id="decorPanel">
    <div style="margin-bottom:4px;">Decorations</div>
    <button data-dec="path">Place Path</button>
    <button data-dec="fence">Place Fence</button>
    <button data-dec="pond">Place Pond</button>
    <button data-dec="tree2">Place Tree</button>
    <div style="margin-top:4px;">Click in world to place.</div>
  </div>
</div>

<script>
let currentTheme = "cute";

/* ---------- Drag-to-scroll camera ---------- */
const world = document.getElementById("world");
const main = document.getElementById("main");

let isDragging = false;
let startX = 0, startY = 0;
let worldX = -500, worldY = -500;

function applyWorldTransform() {
  world.style.transform = `translate(${worldX}px, ${worldY}px)`;
}
applyWorldTransform();

main.addEventListener("mousedown", e => {
  isDragging = true;
  world.classList.add("dragging");
  startX = e.clientX - worldX;
  startY = e.clientY - worldY;
});

window.addEventListener("mousemove", e => {
  if (!isDragging) return;
  worldX = e.clientX - startX;
  worldY = e.clientY - startY;
  applyWorldTransform();
});

window.addEventListener("mouseup", () => {
  isDragging = false;
  world.classList.remove("dragging");
});

main.addEventListener("touchstart", e => {
  const t = e.touches[0];
  isDragging = true;
  world.classList.add("dragging");
  startX = t.clientX - worldX;
  startY = t.clientY - worldY;
});

main.addEventListener("touchmove", e => {
  if (!isDragging) return;
  const t = e.touches[0];
  worldX = t.clientX - startX;
  worldY = t.clientY - startY;
  applyWorldTransform();
});

main.addEventListener("touchend", () => {
  isDragging = false;
  world.classList.remove("dragging");
});

/* ---------- Avatar movement ---------- */
const avatar = document.getElementById("avatar");
let avatarX = 1020;
let avatarY = 970;
const avatarSpeed = 3;
const keys = {};

document.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

function updateAvatar() {
  let dx = 0, dy = 0;
  if (keys["w"] || keys["arrowup"]) dy -= avatarSpeed;
  if (keys["s"] || keys["arrowdown"]) dy += avatarSpeed;
  if (keys["a"] || keys["arrowleft"]) dx -= avatarSpeed;
  if (keys["d"] || keys["arrowright"]) dx += avatarSpeed;

  avatarX += dx;
  avatarY += dy;

  avatarX = Math.max(0, Math.min(1940, avatarX));
  avatarY = Math.max(0, Math.min(1940, avatarY));

  avatar.style.left = avatarX + "px";
  avatar.style.top = avatarY + "px";
}

function gameLoop() {
  updateAvatar();
  requestAnimationFrame(gameLoop);
}
gameLoop();

/* ---------- Garden ---------- */
const garden = document.getElementById("garden");
let plantedCount = 0;

for (let i = 0; i < 16; i++) {
  const tile = document.createElement("div");
  tile.className = "tile";
  tile.dataset.stage = 0;

  tile.onclick = e => {
    e.stopPropagation();
    let stage = Number(tile.dataset.stage);
    if (stage < 4) {
      stage++;
      if (stage === 1) plantedCount++;
      tile.dataset.stage = stage;
      tile.innerHTML = "";
      const plant = document.createElement("div");
      plant.className = "plant stage" + stage;
      tile.appendChild(plant);
      checkTasks();
      playChime();
    }
  };

  garden.appendChild(tile);
}

/* ---------- Tasks & stands ---------- */
const taskItems = document.querySelectorAll("#taskModal li");

function markTaskDone(id) {
  taskItems.forEach(li => {
    if (li.dataset.id === id) li.classList.add("done");
  });
}

function checkTasks() {
  if (plantedCount >= 3) markTaskDone("plant3");
}

document.getElementById("standCute").onclick = e => {
  e.stopPropagation();
  alert("You visited the Cute Stand!");
  markTaskDone("visitCute");
  playChime();
};

document.getElementById("standMagic").onclick = e => {
  e.stopPropagation();
  alert("You visited the Magic Stand!");
  markTaskDone("visitMagic");
  playChime();
};

document.getElementById("standCosmic").onclick = e => {
  e.stopPropagation();
  alert("You visited the Cosmic Stand!");
  markTaskDone("visitCosmic");
  playChime();
};

document.getElementById("standPixel").onclick = e => {
  e.stopPropagation();
  alert("You visited the Pixel Stand!");
  markTaskDone("visitPixel");
  playChime();
};

/* ---------- Task modal ---------- */
const taskBoardButton = document.getElementById("taskBoardButton");
const taskModalBackdrop = document.getElementById("taskModalBackdrop");
const closeTasks = document.getElementById("closeTasks");

taskBoardButton.onclick = e => {
  e.stopPropagation();
  taskModalBackdrop.style.display = "flex";
};

closeTasks.onclick = () => {
  taskModalBackdrop.style.display = "none";
};

taskModalBackdrop.addEventListener("click", e => {
  if (e.target === taskModalBackdrop) {
    taskModalBackdrop.style.display = "none";
  }
});

/* ---------- Decorations ---------- */
let currentDecoration = null;

document.querySelectorAll("#decorPanel button").forEach(btn => {
  btn.addEventListener("click", () => {
    currentDecoration = btn.dataset.dec;
  });
});

world.addEventListener("click", e => {
  if (!currentDecoration) return;
  const rect = world.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const dec = document.createElement("div");
  dec.classList.add("decoration");

  const theme = currentTheme;

  if (currentDecoration === "path") dec.classList.add(`${theme}-path`);
  if (currentDecoration === "fence") dec.classList.add(`${theme}-fence`);
  if (currentDecoration === "pond") dec.classList.add(`${theme}-pond`);
  if (currentDecoration === "tree2") dec.classList.add(`${theme}-tree`);

  dec.style.left = (x - 20) + "px";
  dec.style.top = (y - 20) + "px";
  world.appendChild(dec);
  playChime();
});

/* ---------- Creature rendering ---------- */
function renderCreature(theme) {
  avatar.innerHTML = "";
  const c = document.createElement("div");
  c.classList.add("creature");

  if (theme === "cute") {
    c.classList.add("creature-cute");
    c.innerHTML = `
      <div class="body"></div>
      <div class="ear-left"></div>
      <div class="ear-right"></div>
      <div class="eye-left"></div>
      <div class="eye-right"></div>
      <div class="cheek-left"></div>
      <div class="cheek-right"></div>
      <div class="feet"></div>
    `;
  } else if (theme === "magical") {
    c.classList.add("creature-magical");
    c.innerHTML = `
      <div class="wing-left"></div>
      <div class="wing-right"></div>
      <div class="body"></div>
      <div class="eye-left"></div>
      <div class="eye-right"></div>
      <div class="sparkle"></div>
    `;
  } else if (theme === "cosmic") {
    c.classList.add("creature-cosmic");
    c.innerHTML = `
      <div class="orbit"></div>
      <div class="body"></div>
      <div class="core"></div>
    `;
  } else if (theme === "pixel") {
    c.classList.add("creature-pixel");
    c.innerHTML = `
      <div class="pixel-body"></div>
      <div class="eye-left"></div>
      <div class="eye-right"></div>
      <div class="tail"></div>
    `;
  }

  avatar.appendChild(c);
}

/* ---------- Themes & world styles ---------- */
const worldLabel = document.getElementById("worldLabel");

function setTheme(theme) {
  currentTheme = theme;

  if (theme === "cute") {
    world.style.background =
      "radial-gradient(circle at 20% 20%, rgba(255,255,255,0.4) 0, transparent 40%)," +
      "radial-gradient(circle at 80% 70%, rgba(255,255,255,0.3) 0, transparent 45%)," +
      "repeating-linear-gradient(45deg,#ffeaf3 0,#ffeaf3 24px,#ffd6e8 24px,#ffd6e8 48px)";
    worldLabel.textContent = "GlowGarden – Cute World";
  } else if (theme === "magical") {
    world.style.background =
      "radial-gradient(circle at 20% 20%, rgba(255,255,255,0.3) 0, transparent 40%)," +
      "radial-gradient(circle at 80% 70%, rgba(200,180,255,0.4) 0, transparent 45%)," +
      "repeating-linear-gradient(45deg,#6f5f9f 0,#6f5f9f 24px,#5b4a8a 24px,#5b4a8a 48px)";
    worldLabel.textContent = "GlowGarden – Magical World";
  } else if (theme === "cosmic") {
    world.style.background =
      "radial-gradient(circle at 20% 20%, rgba(255,255,255,0.2) 0, transparent 40%)," +
      "radial-gradient(circle at 80% 70%, rgba(150,200,255,0.4) 0, transparent 45%)," +
      "repeating-linear-gradient(45deg,#0b1f33 0,#0b1f33 24px,#050b14 24px,#050b14 48px)";
    worldLabel.textContent = "GlowGarden – Cosmic World";
  } else if (theme === "pixel") {
    world.style.background =
      "repeating-linear-gradient(45deg,#1f1f1f 0,#1f1f1f 24px,#151515 24px,#151515 48px)";
    worldLabel.textContent = "GlowGarden – Pixel World";
  }

  renderCreature(theme);
}

document.querySelectorAll("#themeButtons button").forEach(btn => {
  btn.addEventListener("click", () => setTheme(btn.dataset.theme));
});

setTheme("cute");

/* ---------- Sound ---------- */
let soundOn = false;
const soundToggle = document.getElementById("soundToggle");

soundToggle.onclick = () => {
  soundOn = !soundOn;
  soundToggle.textContent = "Sound: " + (soundOn ? "On" : "Off");
};

function playChime() {
  if (!soundOn) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.25);
  } catch (e) {}
}
</script>
