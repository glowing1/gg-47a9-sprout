<!DOCTYPE html>
<html>
<head>
<style>
/* CHUNK 1 GOES HERE */
*{margin:0;padding:0;box-sizing:border-box}body,html{width:100%;height:100%;overflow:hidden;font-family:sans-serif}#world{position:relative;width:2000px;height:2000px;transform-origin:0 0;transition:background .4s}#player{position:absolute;width:40px;height:40px;border-radius:50%;background:#fff;box-shadow:0 0 6px #0004;z-index:10;transition:.15s}#plaza{position:absolute;left:900px;top:900px;width:300px;height:300px;border-radius:40%;background:#fff2;backdrop-filter:blur(3px);box-shadow:0 0 20px #0003;z-index:5}.stall{position:absolute;width:90px;height:90px;border-radius:20px;background:#fff;box-shadow:0 0 10px #0003}.stall.cute{background:#ffe6f2;border:3px solid #ffb3d9}.stall.magical{background:#e6e0ff;border:3px solid #b8a6ff}.stall.cosmic{background:#0d0f33;border:3px solid #4d4dff}.stall.pixel{background:#d0ffd0;border:3px solid #00aa00;image-rendering:pixelated}.path{position:absolute;border-radius:50px;background:#fff8;box-shadow:0 0 10px #0002}.path.pixel{border-radius:0;background:#ccc;image-rendering:pixelated}#gardenArea{position:absolute;width:420px;height:420px;left:300px;top:300px;background:#fff1;border-radius:45% 55% 50% 60%/60% 50% 55% 45%;box-shadow:0 0 20px #0003}.cuteWorld{background:#dfffe0}.magicalWorld{background:#f0e6ff}.cosmicWorld{background:#0a0d26}.pixelWorld{background:#c8ffc8;image-rendering:pixelated}
</style>
</head>
<body>
<!-- CHUNK 2 GOES HERE -->
<div id="world" class="cuteWorld">
<div id="player"></div>

<div id="plaza">
<div class="stall cute" style="left:20px;top:20px"></div>
<div class="stall magical" style="right:20px;top:20px"></div>
<div class="stall cosmic" style="left:20px;bottom:20px"></div>
</div>

<div class="stall pixel" style="left:1400px;top:600px"></div>
<div class="stall cute" style="left:400px;top:1500px"></div>

<div id="gardenArea"></div>

<div class="path" style="left:600px;top:600px;width:300px;height:80px"></div>
<div class="path" style="left:700px;top:800px;width:80px;height:300px"></div>
<div class="path pixel" style="left:1200px;top:500px;width:300px;height:80px"></div>
</div>
<script>
/* CHUNK 3 GOES HERE */
let w=document.getElementById("world"),p=document.getElementById("player"),px=950,py=950,speed=6,keys={},curWorld="cute";document.onkeydown=e=>keys[e.key]=1;document.onkeyup=e=>keys[e.key]=0;
function movePlayer(){let dx=0,dy=0;if(keys["ArrowUp"]||keys["w"])dy-=speed;if(keys["ArrowDown"]||keys["s"])dy+=speed;if(keys["ArrowLeft"]||keys["a"])dx-=speed;if(keys["ArrowRight"]||keys["d"])dx+=speed;px+=dx;py+=dy;px=Math.max(0,Math.min(1960,px));py=Math.max(0,Math.min(1960,py));p.style.left=px+"px";p.style.top=py+"px";}
setInterval(movePlayer,20);
/* CHUNK 4 GOES HERE */
function switchWorld(wd){
curWorld=wd;
w.className=wd+"World";
if(wd==="pixel")speed=4;else speed=6;
}
function checkWorldSwitch(){
if(px<200&&py<200)switchWorld("cute");
if(px>1700&&py<200)switchWorld("magical");
if(px<200&&py>1700)switchWorld("cosmic");
if(px>1700&&py>1700)switchWorld("pixel");
}
setInterval(checkWorldSwitch,100);
/* CHUNK 5 GOES HERE */
function cam(){let cx=window.innerWidth/2,cy=window.innerHeight/2;let tx=cx-px,ty=cy-py;if(curWorld==="pixel"){tx*=0.7;ty*=0.7;}w.style.transform=`translate(${tx}px,${ty}px)`;}setInterval(cam,20);

</script>
</body>
</html>
