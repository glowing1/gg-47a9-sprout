<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GlowGarden – Tasks & Rewards</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #87c27b;
    font-family: system-ui, sans-serif;
  }

  #topBar {
    height: 48px;
    background: linear-gradient(90deg,#4f7b3a,#365427);
    color: #f5f5ff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    font-size: 13px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.4);
  }

  #worldLabel {
    font-weight: 600;
  }

  #themeButtons button {
    margin-left: 4px;
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.2);
    color: #f5f5ff;
    font-size: 11px;
    cursor: pointer;
  }

  #themeButtons button:hover {
    background: rgba(255,255,255,0.15);
  }

  #soundToggle {
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.2);
    cursor: pointer;
    font-size: 11px;
  }

  #main {
    position: relative;
    width: 100vw;
    height: calc(100vh - 48px);
    overflow: hidden;
    background: #7fb86f;
  }

  /* Medium world */
  #world {
    position: absolute;
    width: 2000px;
    height: 2000px;
    border-radius: 40px;
    box-shadow: 0 0 40px rgba(0,0,0,0.4);
    cursor: grab;
  }

  #world.dragging {
    cursor: grabbing;
  }

  /* Plaza */
  #plaza {
    position: absolute;
    left: 900px;
    top: 900px;
    width: 260px;
    height: 260px;
    background: radial-gradient(circle,#f5e0b8,#d9a96a);
    border-radius: 40px;
    box-shadow: 0 0 30px rgba(0,0,0,0.4);
    border: 4px solid #c28b4a;
  }

  /* Garden */
  #garden {
    position: absolute;
    left: 930px;
    top: 1030px;
    width: 256px;
    height: 256px;
    display: grid;
    grid-template-columns: repeat(4,64px);
    grid-template-rows: repeat(4,64px);
    gap: 4px;
  }

  .tile {
    width: 64px;
    height: 64px;
    background: #5b3b24;
    border-radius: 6px;
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.15);
    cursor: pointer;
    position: relative;
  }

  .plant {
    position: absolute;
    left: 18px;
    top: 18px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
  }

  .stage1 { background:#7fd37f; box-shadow:0 0 8px #7fd37f; }
  .stage2 { background:#ffdf80; box-shadow:0 0 8px #ffdf80; }
  .stage3 { background:#ff8fa3; box-shadow:0 0 8px #ff8fa3; }
  .stage4 { background:#c9a7ff; box-shadow:0 0 8px #c9a7ff; }

  /* Stands */
  .stand {
    position: absolute;
    width: 170px;
    height: 115px;
    border-radius: 18px;
    box-shadow: 0 12px 26px rgba(0,0,0,0.45);
    cursor: pointer;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-size: 14px;
    color: #fff;
    font-weight: 700;
    padding-bottom: 10px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
  }

  /* arranged in a ring around the plaza */
  #standCute {
    left: 760px;
    top: 820px;
    background: linear-gradient(180deg,#ffe3ec,#ff8fa3);
  }

  #standMagic {
    left: 1220px;
    top: 820px;
    background: radial-gradient(circle,#f5ecff,#7f5fff);
  }

  #standCosmic {
    left: 740px;
    top: 1180px;
    background: radial-gradient(circle,#f0fbff,#3a7bbf);
  }

  #standPixel {
    left: 1240px;
    top: 1180px;
    background: repeating-linear-gradient(90deg,#fff2b3 0,#fff2b3 8px,#ffd966 8px,#ffd966 16px);
  }

  /* Minigames stand above plaza */
  #standMini {
    left: 960px;
    top: 760px;
    background: linear-gradient(180deg,#9be7ff,#3a7bbf);
  }

  /* Task stand below plaza */
  #standTasks {
    left: 960px;
    top: 1220px;
    background: linear-gradient(180deg,#e3c48f,#c28b4a);
  }

  /* Avatar container */
  #avatar {
    position: absolute;
    width: 60px;
    height: 60px;
    left: 1020px;
    top: 970px;
  }

  .creature {
    position: relative;
    width: 100%;
    height: 100%;
  }

  /* Cute creature: Pufflet */
  .creature-cute .body {
    position: absolute;
    width: 52px;
    height: 48px;
    left: 4px;
    top: 8px;
    background: radial-gradient(circle at 30% 20%, #fff, #ffb7c5);
    border-radius: 50px;
    box-shadow: 0 0 10px #ffb7c5;
  }

  .creature-cute .ear-left,
  .creature-cute .ear-right {
    position: absolute;
    width: 16px;
    height: 24px;
    background: #ffe3ec;
    border-radius: 16px;
    box-shadow: 0 0 4px rgba(0,0,0,0.1);
  }

  .creature-cute .ear-left { left: 8px; top: 0; }
  .creature-cute .ear-right { right: 8px; top: 0; }

  .creature-cute .eye-left,
  .creature-cute .eye-right {
    position: absolute;
    width: 10px;
    height: 12px;
    background: #2b1b1b;
    border-radius: 50%;
    top: 22px;
  }

  .creature-cute .eye-left { left: 18px; }
  .creature-cute .eye-right { right: 18px; }

  .creature-cute .eye-left::after,
  .creature-cute .eye-right::after {
    content: "";
    position: absolute;
    width: 4px;
    height: 4px;
    background: #fff;
    border-radius: 50%;
    top: 2px;
    left: 3px;
  }

  .creature-cute .cheek-left,
  .creature-cute .cheek-right {
    position: absolute;
    width: 8px;
    height: 6px;
    background: #ff8fa3;
    border-radius: 50%;
    top: 34px;
  }

  .creature-cute .cheek-left { left: 14px; }
  .creature-cute .cheek-right { right: 14px; }

  .creature-cute .feet {
    position: absolute;
    width: 32px;
    height: 8px;
    left: 14px;
    bottom: 4px;
    display: flex;
    justify-content: space-between;
  }

  .creature-cute .feet::before,
  .creature-cute .feet::after {
    content: "";
    width: 10px;
    height: 8px;
    background: #c28b4a;
    border-radius: 10px 10px 4px 4px;
  }

  .creature-cute {
    animation: cuteBounce 1.8s infinite ease-in-out, cuteSparkle 3s infinite ease-in-out;
  }

  /* Magical creature: Faelight */
  .creature-magical .body {
    position: absolute;
    width: 46px;
    height: 46px;
    left: 7px;
    top: 10px;
    background: radial-gradient(circle, #f7f0ff, #b28cff);
    border-radius: 50%;
    box-shadow: 0 0 16px #c9a7ff;
  }

  .creature-magical .wing-left,
  .creature-magical .wing-right {
    position: absolute;
    width: 22px;
    height: 30px;
    background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(200,180,255,0.1));
    border-radius: 50%;
    top: 16px;
    filter: blur(0.5px);
  }

  .creature-magical .wing-left { left: -6px; }
  .creature-magical .wing-right { right: -6px; }

  .creature-magical .eye-left,
  .creature-magical .eye-right {
    position: absolute;
    width: 8px;
    height: 10px;
    background: #2b1b3b;
    border-radius: 50%;
    top: 22px;
  }

  .creature-magical .eye-left { left: 20px; }
  .creature-magical .eye-right { right: 20px; }

  .creature-magical .eye-left::after,
  .creature-magical .eye-right::after {
    content: "";
    position: absolute;
    width: 3px;
    height: 3px;
    background: #fff;
    border-radius: 50%;
    top: 2px;
    left: 3px;
  }

  .creature-magical .sparkle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 0 8px #fff;
    top: 8px;
    left: 40px;
    opacity: 0.8;
  }

  .creature-magical {
    animation: magicalPulse 2.2s infinite ease-in-out, magicalGlow 3.5s infinite ease-in-out;
  }

  /* Cosmic creature: Starling */
  .creature-cosmic .body {
    position: absolute;
    width: 50px;
    height: 50px;
    left: 5px;
    top: 8px;
    background: radial-gradient(circle at 30% 20%, #e0f6ff, #163a5c);
    border-radius: 50%;
    box-shadow: 0 0 18px #7fd0ff;
  }

  .creature-cosmic .core {
    position: absolute;
    width: 20px;
    height: 20px;
    left: 20px;
    top: 20px;
    background: radial-gradient(circle, #fff, #7fd0ff);
    border-radius: 50%;
    box-shadow: 0 0 10px #7fd0ff;
  }

  .creature-cosmic .orbit {
    position: absolute;
    width: 60px;
    height: 60px;
    left: 0;
    top: 4px;
    border-radius: 50%;
    border: 1px dashed rgba(127,208,255,0.6);
    box-sizing: border-box;
    animation: orbitSpin 4s linear infinite;
  }

  .creature-cosmic .orbit::before {
    content: "";
    position: absolute;
    width: 6px;
    height: 6px;
    background: #7fd0ff;
    border-radius: 50%;
    top: -3px;
    left: 27px;
    box-shadow: 0 0 8px #7fd0ff;
  }

  .creature-cosmic {
    animation: cosmicDrift 2.6s infinite ease-in-out, cosmicShimmer 2s infinite ease-in-out;
  }

  @keyframes orbitSpin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Pixel creature: Bitling */
  .creature-pixel {
    width: 48px;
    height: 48px;
    margin: 6px;
    position: relative;
    image-rendering: pixelated;
    animation: pixelFlicker 0.9s infinite steps(2);
  }

  .creature-pixel .pixel-body {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(#f4d7b5 0 12px,#f4d7b5 12px 24px,#c28b4a 24px 36px,#3b2614 36px 48px);
  }

  .creature-pixel .eye-left,
  .creature-pixel .eye-right {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #2b1b1b;
    top: 14px;
  }

  .creature-pixel .eye-left { left: 12px; }
  .creature-pixel .eye-right { right: 12px; }

  .creature-pixel .eye-left::after,
  .creature-pixel .eye-right::after {
    content: "";
    position: absolute;
    width: 2px;
    height: 2px;
    background: #fff;
    top: 1px;
    left: 1px;
  }

  .creature-pixel .tail {
    position: absolute;
    width: 8px;
    height: 16px;
    right: -6px;
    top: 24px;
    background: #3b2614;
  }

  /* Decorations base */
  .decoration {
    position: absolute;
    pointer-events: none;
  }

  /* Cute decorations */
  .cute-path {
    width: 40px;
    height: 40px;
    background: #ffd6e8;
    border-radius: 10px;
    box-shadow: 0 0 6px #ffb7c5;
  }

  .cute-fence {
    width: 50px;
    height: 20px;
    background: #ffe3ec;
    border: 2px solid #ff8fa3;
    border-radius: 6px;
  }

  .cute-pond {
    width: 90px;
    height: 70px;
    background: radial-gradient(circle at 30% 20%, #fff, #b3eaff);
    border-radius: 60% 50% 55% 65%;
    box-shadow: 0 0 14px #a0e0ff;
  }

  .cute-tree {
    width: 50px;
    height: 70px;
    background: #ffb7c5;
    border-radius: 30px 30px 20px 20px;
    box-shadow: 0 0 10px #ff8fa3;
  }

  /* Magical decorations */
  .magical-path {
    width: 40px;
    height: 40px;
    background: #c9a7ff;
    border-radius: 10px;
    box-shadow: 0 0 10px #b28cff;
  }

  .magical-fence {
    width: 50px;
    height: 20px;
    background: #e5d4ff;
    border: 2px solid #7f5fff;
    border-radius: 6px;
  }

  .magical-pond {
    width: 90px;
    height: 70px;
    background: radial-gradient(circle at 30% 20%, #fff, #a0c0ff);
    border-radius: 55% 60% 50% 65%;
    box-shadow: 0 0 16px #7f5fff;
  }

  .magical-tree {
    width: 50px;
    height: 70px;
    background: #d9c2ff;
    border-radius: 30px 30px 20px 20px;
    box-shadow: 0 0 12px #b28cff;
  }

  /* Cosmic decorations */
  .cosmic-path {
    width: 40px;
    height: 40px;
    background: #1b2a40;
    border-radius: 10px;
    box-shadow: 0 0 10px #3a7bbf;
  }

  .cosmic-fence {
    width: 50px;
    height: 20px;
    background: #0b1f33;
    border: 2px solid #3a7bbf;
    border-radius: 6px;
  }

  .cosmic-pond {
    width: 90px;
    height: 70px;
    background: radial-gradient(circle at 30% 20%, #e0f6ff, #163a5c);
    border-radius: 60% 55% 50% 65%;
    box-shadow: 0 0 18px #7fd0ff;
  }

  .cosmic-tree {
    width: 50px;
    height: 70px;
    background: linear-gradient(#163a5c,#0b1f33);
    border-radius: 30px 30px 20px 20px;
    box-shadow: 0 0 14px #3a7bbf;
  }

  /* Pixel decorations */
  .pixel-path {
    width: 40px;
    height: 40px;
    background: repeating-linear-gradient(
      0deg,
      #d9d9d9 0 8px,
      #bfbfbf 8px 16px
    );
    image-rendering: pixelated;
  }

  .pixel-fence {
    width: 50px;
    height: 20px;
    background: repeating-linear-gradient(
      90deg,
      #fff2b3 0 8px,
      #ffd966 8px 16px
    );
    image-rendering: pixelated;
  }

  .pixel-pond {
    width: 90px;
    height: 70px;
    background: repeating-linear-gradient(
      0deg,
      #66ccff 0 8px,
      #3399ff 8px 16px
    );
    border-radius: 0;
    image-rendering: pixelated;
  }

  .pixel-tree {
    width: 50px;
    height: 70px;
    background: repeating-linear-gradient(
      0deg,
      #4f7b3a 0 8px,
      #2f4f23 8px 16px
    );
    image-rendering: pixelated;
  }

  /* Decoration animations */
  @keyframes cuteBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }

  @keyframes cuteSparkle {
    0% { box-shadow: 0 0 6px #ffb7c5; }
    50% { box-shadow: 0 0 12px #ffe3ec; }
    100% { box-shadow: 0 0 6px #ffb7c5; }
  }

  @keyframes magicalPulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  @keyframes magicalGlow {
    0% { box-shadow: 0 0 10px #b28cff; }
    50% { box-shadow: 0 0 18px #d9c2ff; }
    100% { box-shadow: 0 0 10px #b28cff; }
  }

  @keyframes cosmicDrift {
    0% { transform: translateX(0); }
    50% { transform: translateX(6px); }
    100% { transform: translateX(0); }
  }

  @keyframes cosmicShimmer {
    0% { opacity: 0.9; }
    50% { opacity: 1; }
    100% { opacity: 0.9; }
  }

  @keyframes pixelFlicker {
    0% { filter: brightness(1); }
    50% { filter: brightness(1.3); }
    100% { filter: brightness(1); }
  }

  .cute-path, .cute-fence, .cute-pond, .cute-tree {
    animation: cuteBounce 2s infinite ease-in-out,
               cuteSparkle 3s infinite ease-in-out;
  }

  .magical-path, .magical-fence, .magical-pond, .magical-tree {
    animation: magicalPulse 2.5s infinite ease-in-out,
               magicalGlow 4s infinite ease-in-out;
  }

  .cosmic-path, .cosmic-fence, .cosmic-pond, .cosmic-tree {
    animation: cosmicDrift 3s infinite ease-in-out,
               cosmicShimmer 2s infinite ease-in-out;
  }

  .pixel-path, .pixel-fence, .pixel-pond, .pixel-tree {
    animation: pixelFlicker 0.8s infinite steps(2);
  }

  /* Task modal */
  #taskModalBackdrop {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
  }

  #taskModal {
    width: 320px;
    max-height: 360px;
    background: #f7f0e2;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    padding: 10px;
    color: #3b2614;
    font-size: 13px;
    display: flex;
    flex-direction: column;
  }

  #taskModal h3 {
    margin: 0 0 6px 0;
    font-size: 15px;
  }

  #taskModal h4 {
    margin: 6px 0 4px 0;
    font-size: 13px;
  }

  #taskList {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 6px;
  }

  .taskItem {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
    gap: 4px;
  }

  .taskItem span {
    flex: 1;
  }

  .taskItem.done span {
    text-decoration: line-through;
    color: #8b7b66;
  }

  .taskItem button {
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 6px;
    border: 1px solid #c28b4a;
    background: #e3c48f;
    cursor: pointer;
  }

  #closeTasks {
    align-self: flex-end;
    margin-top: 4px;
    padding: 3px 8px;
    border-radius: 6px;
    border: 1px solid #c28b4a;
    background: #e3c48f;
    cursor: pointer;
    font-size: 12px;
  }

  /* Decorations panel */
  #decorPanel {
    position: absolute;
    right: 16px;
    bottom: 16px;
    background: rgba(0,0,0,0.4);
    border-radius: 10px;
    padding: 6px;
    color: #f5f5ff;
    font-size: 11px;
  }

  #decorPanel button {
    margin: 2px 0;
    width: 100%;
    padding: 3px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.3);
    color: #f5f5ff;
    cursor: pointer;
  }

  #decorPanel button:hover {
    background: rgba(255,255,255,0.15);
  }

  /* Inventory panel */
  #inventoryPanel {
    position: absolute;
    left: 16px;
    bottom: 16px;
    background: rgba(0,0,0,0.45);
    border-radius: 10px;
    padding: 6px 8px;
    color: #f5f5ff;
    font-size: 11px;
    max-width: 220px;
  }

  #inventoryPanel h4 {
    margin: 0 0 4px 0;
    font-size: 12px;
  }

  #inventorySeeds {
    margin-bottom: 4px;
  }

  #inventoryDecor {
    max-height: 80px;
    overflow-y: auto;
  }

  #inventoryDecor div {
    margin-bottom: 2px;
  }
</style>
</head>
<body>

<div id="topBar">
  <span id="worldLabel">GlowGarden – Cute World</span>
  <div id="themeButtons">
    <button data-theme="cute">Cute</button>
    <button data-theme="magical">Magical</button>
    <button data-theme="cosmic">Cosmic</button>
    <button data-theme="pixel">Pixel</button>
  </div>
  <button id="soundToggle">Sound: Off</button>
</div>

<div id="main">
  <div id="world">
    <div id="plaza"></div>
    <div id="garden"></div>

    <div id="standCute" class="stand">Cute Stand</div>
    <div id="standMagic" class="stand">Magic Stand</div>
    <div id="standCosmic" class="stand">Cosmic Stand</div>
    <div id="standPixel" class="stand">Pixel Stand</div>
    <div id="standMini" class="stand">Minigames</div>
    <div id="standTasks" class="stand">Tasks</div>

    <div id="avatar"></div>
  </div>

  <!-- Task modal -->
  <div id="taskModalBackdrop">
    <div id="taskModal">
      <h3>Garden Tasks</h3>
      <div id="taskList"></div>
      <button id="closeTasks">Close</button>
    </div>
  </div>

  <!-- Decorations panel -->
  <div id="decorPanel">
    <div style="margin-bottom:4px;">Decorations</div>
    <button data-dec="path">Place Path</button>
    <button data-dec="fence">Place Fence</button>
    <button data-dec="pond">Place Pond</button>
    <button data-dec="tree2">Place Tree</button>
    <div style="margin-top:4px;">Click in world to place.</div>
  </div>

  <!-- Inventory panel -->
  <div id="inventoryPanel">
    <h4>Inventory</h4>
    <div id="inventorySeeds">Seeds: 0</div>
    <div><strong>Decor:</strong></div>
    <div id="inventoryDecor"></div>
  </div>
</div>

<script>
let currentTheme = "cute";

/* ---------- Drag-to-scroll camera ---------- */
const world = document.getElementById("world");
const main = document.getElementById("main");

let isDragging = false;
let startX = 0, startY = 0;
let worldX = -500, worldY = -500;

function applyWorldTransform() {
  world.style.transform = `translate(${worldX}px, ${worldY}px)`;
}
applyWorldTransform();

main.addEventListener("mousedown", e => {
  isDragging = true;
  world.classList.add("dragging");
  startX = e.clientX - worldX;
  startY = e.clientY - worldY;
});

window.addEventListener("mousemove", e => {
  if (!isDragging) return;
  worldX = e.clientX - startX;
  worldY = e.clientY - startY;
  applyWorldTransform();
});

window.addEventListener("mouseup", () => {
  isDragging = false;
  world.classList.remove("dragging");
});

main.addEventListener("touchstart", e => {
  const t = e.touches[0];
  isDragging = true;
  world.classList.add("dragging");
  startX = t.clientX - worldX;
  startY = t.clientY - worldY;
});

main.addEventListener("touchmove", e => {
  if (!isDragging) return;
  const t = e.touches[0];
  worldX = t.clientX - startX;
  worldY = t.clientY - startY;
  applyWorldTransform();
});

main.addEventListener("touchend", () => {
  isDragging = false;
  world.classList.remove("dragging");
});

/* ---------- Avatar movement ---------- */
const avatar = document.getElementById("avatar");
let avatarX = 1020;
let avatarY = 970;
const avatarSpeed = 3;
const keys = {};

document.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;
});

document.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

function updateAvatar() {
  let dx = 0, dy = 0;
  if (keys["w"] || keys["arrowup"]) dy -= avatarSpeed;
  if (keys["s"] || keys["arrowdown"]) dy += avatarSpeed;
  if (keys["a"] || keys["arrowleft"]) dx -= avatarSpeed;
  if (keys["d"] || keys["arrowright"]) dx += avatarSpeed;

  avatarX += dx;
  avatarY += dy;

  avatarX = Math.max(0, Math.min(1940, avatarX));
  avatarY = Math.max(0, Math.min(1940, avatarY));

  avatar.style.left = avatarX + "px";
  avatar.style.top = avatarY + "px";
}

function gameLoop() {
  updateAvatar();
  requestAnimationFrame(gameLoop);
}
gameLoop();

const tasks = [
  // Small tasks
  { id: "drinkWater", label: "Drink water", size: "small", reward: { type: "seed", name: "Green seed" }, done: false },
  { id: "stretch", label: "Stretch for 1 minute", size: "small", reward: { type: "seed", name: "Pink seed" }, done: false },

  { id: "goOutside2", label: "Go outside for 2 minutes", size: "small", reward: { type: "seed", name: "Nature seed" }, done: false },

  { id: "schoolAssignment", label: "Do a school assignment", size: "medium", reward: { type: "seed", name: "Special seed" }, done: false },
  { id: "organizeBackpack", label: "Organize your backpack", size: "medium", reward: { type: "decor", name: "Mini flower pot" }, done: false },
  { id: "helpHome", label: "Help someone at home", size: "medium", reward: { type: "seed", name: "Special seed" }, done: false },
  { id: "practiceHobby", label: "Practice a hobby", size: "medium", reward: { type: "decor", name: "Tiny mushroom" }, done: false },

  // Big tasks
  { id: "finishHomework", label: "Finish all homework", size: "big", reward: { type: "decor", name: "Pastel bench" }, done: false },
  { id: "study30", label: "Study for 30 minutes", size: "big", reward: { type: "decor", name: "Heart lamp" }, done: false },

  { id: "bigChore", label: "Do a big chore (laundry/dishes/vacuum)", size: "big", reward: { type: "decor", name: "Garden lantern" }, done: false },
  { id: "goOutside20", label: "Go outside for 20 minutes", size: "big", reward: { type: "decor", name: "Stardust planter" }, done: false }
];

function renderTasks() {
  taskListEl.innerHTML = "";

  function addSection(title, size) {
    const sectionTasks = tasks.filter(t => t.size === size);
    if (!sectionTasks.length) return;
    const h4 = document.createElement("h4");
    h4.textContent = title;
    taskListEl.appendChild(h4);

    sectionTasks.forEach(task => {
      const row = document.createElement("div");
      row.className = "taskItem" + (task.done ? " done" : "");
      const label = document.createElement("span");
      label.textContent = task.label + " – Reward: " +
        (task.reward.type === "seed" ? task.reward.name : task.reward.name);
      const btn = document.createElement("button");
      btn.textContent = task.done ? "Done" : "Complete";
      btn.disabled = task.done;
      btn.onclick = () => completeTask(task.id);
      row.appendChild(label);
      row.appendChild(btn);
      taskListEl.appendChild(row);
    });
  }

  addSection("Small tasks (seeds)", "small");
  addSection("Medium tasks (seeds & small decor)", "medium");
  addSection("Big tasks (furniture & decor)", "big");
}

function completeTask(id) {
  const task = tasks.find(t => t.id === id);
  if (!task || task.done) return;
  task.done = true;

  if (task.reward.type === "seed") {
    if (task.reward.name === "2 seeds") {
      seedCount += 2;
    } else {
      seedCount += 1;
    }
  } else if (task.reward.type === "decor") {
    decorItems.push(task.reward.name);
  }

  updateInventoryUI();
  renderTasks();
  playChime();
  alert("You completed: " + task.label + "!\nYou earned: " + task.reward.name);
}

/* ---------- Sound ---------- */
let soundOn = false;
const soundToggle = document.getElementById("soundToggle");

soundToggle.onclick = () => {
  soundOn = !soundOn;
  soundToggle.textContent = "Sound: " + (soundOn ? "On" : "Off");
};

function playChime() {
  if (!soundOn) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.25);
  } catch (e) {}
}
