<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GlowGarden – Multi World</title>
<style>
html,body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  font-family:sans-serif;
  background:#020617;
  color:#f9fafb;
}

/* Top bar */
#topbar{
  height:40px;
  background:#0f172a;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  font-size:14px;
}
#topbar button{
  margin-left:6px;
  padding:4px 8px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  font-size:12px;
}

/* Scroll area */
#viewport{
  position:absolute;
  top:40px;left:0;right:0;bottom:0;
  overflow:auto;
}

/* Worlds */
.world{
  position:relative;
  width:1600px;
  height:1600px;
  margin:0 auto;
  display:none;
}

/* Backgrounds */
.cuteWorld{
  background:radial-gradient(circle at 20% 20%,#ffeef7,#dfffe0);
}
.magicalWorld{
  background:radial-gradient(circle at 10% 0,#fbe6ff,#dfe5ff);
}
.cosmicWorld{
  background:radial-gradient(circle at 10% 0,#1e293b,#020617);
}
.pixelWorld{
  background:#9be58a;
  background-image:
    linear-gradient(#8fd27f 1px,transparent 1px),
    linear-gradient(90deg,#8fd27f 1px,transparent 1px);
  background-size:16px 16px;
  image-rendering:pixelated;
}

/* Player base */
.player{
  position:absolute;
}

/* Cute player */
.player.cute{
  width:40px;height:48px;
  border-radius:14px;
  background:linear-gradient(#fff7f7,#ffd6e8);
  border:2px solid #ff9acb;
  box-shadow:0 0 8px #0004;
}
.player.cute::before{
  content:"";
  position:absolute;
  left:8px;top:4px;
  width:24px;height:20px;
  border-radius:50%;
  background:#ffeef7;
  border:2px solid #ff9acb;
}
.player.cute::after{
  content:"";
  position:absolute;
  left:11px;top:10px;
  width:18px;height:6px;
  border-radius:10px;
  box-shadow:0 0 0 2px #333,10px 0 0 2px #333;
}

/* Magical player */
.player.magical{
  width:36px;height:48px;
  border-radius:10px;
  background:linear-gradient(#ede9fe,#a855f7);
  border:2px solid #7c3aed;
  box-shadow:0 0 12px #a855f7;
}
.player.magical::before{
  content:"";
  position:absolute;
  left:8px;top:4px;
  width:20px;height:20px;
  border-radius:50%;
  background:#f5f3ff;
  border:2px solid #4c1d95;
}

/* Cosmic player */
.player.cosmic{
  width:38px;height:38px;
  border-radius:50%;
  border:3px solid #38bdf8;
  box-shadow:0 0 16px #38bdf8;
}

/* Pixel player */
.player.pixel{
  width:32px;height:32px;
  background:#facc15;
  border:3px solid #78350f;
  box-shadow:0 0 0 3px #f97316;
  image-rendering:pixelated;
}

/* Travel Station */
.station{
  position:absolute;
  width:120px;height:100px;
  left:740px;top:400px;
}

/* Cute station */
.cuteWorld .station{
  background:#fee2e2;
  border:2px solid #fb7185;
  border-radius:12px;
  box-shadow:0 8px 18px #0004;
}
.cuteWorld .station::before{
  content:"";
  position:absolute;
  top:-26px;left:-6px;
  width:132px;height:40px;
  border-radius:18px 18px 10px 10px;
  background:linear-gradient(#fecaca,#fb7185);
  box-shadow:0 4px 10px #0004;
}
.cuteWorld .station::after{
  content:"Travel";
  position:absolute;
  bottom:8px;left:0;right:0;
  text-align:center;
  font-size:13px;
  color:#b91c1c;
}

/* Magical station */
.magicalWorld .station{
  background:#ede9fe;
  border:2px solid #7c3aed;
  border-radius:12px;
  box-shadow:0 8px 18px #0004;
}
.magicalWorld .station::before{
  content:"";
  position:absolute;
  top:-26px;left:-6px;
  width:132px;height:40px;
  border-radius:18px 18px 10px 10px;
  background:linear-gradient(#c4b5fd,#7c3aed);
  box-shadow:0 4px 10px #0004;
}
.magicalWorld .station::after{
  content:"Travel";
  position:absolute;
  bottom:8px;left:0;right:0;
  text-align:center;
  font-size:13px;
  color:#4c1d95;
}

/* Cosmic station */
.cosmicWorld .station{
  background:#020617;
  border:2px solid #38bdf8;
  border-radius:12px;
  box-shadow:0 0 20px #38bdf8;
}
.cosmicWorld .station::before{
  content:"";
  position:absolute;
  top:-26px;left:-6px;
  width:132px;height:40px;
  border-radius:18px 18px 10px 10px;
  background:linear-gradient(#0f172a,#38bdf8);
  box-shadow:0 0 20px #38bdf8;
}
.cosmicWorld .station::after{
  content:"Travel";
  position:absolute;
  bottom:8px;left:0;right:0;
  text-align:center;
  font-size:13px;
  color:#e5e7eb;
}

/* Pixel station */
.pixelWorld .station{
  width:112px;height:80px;
  background:#e5e5e5;
  border:3px solid #4b5563;
  box-shadow:0 0 0 3px #111827;
  image-rendering:pixelated;
}
.pixelWorld .station::before{
  content:"";
  position:absolute;
  top:-20px;left:-4px;
  width:120px;height:24px;
  background:repeating-linear-gradient(90deg,#f97316 0 8px,#facc15 8px 16px);
  border:3px solid #4b5563;
}
.pixelWorld .station::after{
  content:"TRAVEL";
  position:absolute;
  bottom:6px;left:0;right:0;
  text-align:center;
  font-size:10px;
  color:#111827;
}

/* Simple decor */
.tree{
  position:absolute;
  width:40px;height:60px;
  border-radius:30px 30px 18px 18px;
  background:radial-gradient(circle at 30% 20%,#fff,#f9a8d4);
  box-shadow:0 0 10px #f9a8d4;
}
.tree::after{
  content:"";
  position:absolute;
  bottom:-10px;left:16px;
  width:8px;height:14px;
  background:#8b5a3c;
  border-radius:4px;
}
.crystal{
  position:absolute;
  width:26px;height:50px;
  border-radius:10px;
  background:linear-gradient(#a5b4fc,#f97316);
  box-shadow:0 0 12px #a5b4fc;
}
.star{
  position:absolute;
  width:6px;height:6px;
  border-radius:50%;
  background:#e5e7eb;
  box-shadow:0 0 10px #e5e7eb;
}
.pixelTree{
  position:absolute;
  width:24px;height:24px;
  background:#22c55e;
  box-shadow:0 0 0 3px #166534;
  image-rendering:pixelated;
}

/* Travel overlay */
#travelOverlay{
  position:fixed;
  inset:0;
  background:#0007;
  display:none;
  align-items:center;
  justify-content:center;
  z-index:50;
}
#travelBox{
  background:#f9fafb;
  color:#111827;
  padding:16px 20px;
  border-radius:14px;
  box-shadow:0 10px 30px #0008;
  text-align:center;
}
#travelBox h2{margin-top:0;margin-bottom:10px}
#travelBox button{
  display:block;
  width:220px;
  margin:6px auto;
  padding:8px;
  border-radius:10px;
  border:none;
  cursor:pointer;
  font-size:13px;
}
.btnCute{background:#fecaca}
.btnMagical{background:#e9d5ff}
.btnCosmic{background:#bfdbfe}
.btnPixel{background:#bbf7d0}
</style>
</head>
<body>

<div id="topbar">
  <div>GlowGarden – <span id="worldLabel">Cute World</span></div>
  <div>
    <span style="font-size:12px;opacity:.8">Use arrow keys / WASD to move</span>
  </div>
</div>

<div id="viewport">
  <!-- Cute World -->
  <div id="cuteWorld" class="world cuteWorld">
    <div class="station"></div>
    <div class="tree" style="left:300px;top:300px"></div>
    <div class="tree" style="left:1200px;top:500px"></div>
    <div class="tree" style="left:500px;top:1100px"></div>
  </div>

  <!-- Magical World -->
  <div id="magicalWorld" class="world magicalWorld">
    <div class="station"></div>
    <div class="crystal" style="left:300px;top:300px"></div>
    <div class="crystal" style="left:1200px;top:500px"></div>
    <div class="crystal" style="left:500px;top:1100px"></div>
  </div>

  <!-- Cosmic World -->
  <div id="cosmicWorld" class="world cosmicWorld">
    <div class="station"></div>
    <div class="star" style="left:200px;top:200px"></div>
    <div class="star" style="left:1300px;top:400px"></div>
    <div class="star" style="left:900px;top:1200px"></div>
  </div>

  <!-- Pixel World -->
  <div id="pixelWorld" class="world pixelWorld">
    <div class="station"></div>
    <div class="pixelTree" style="left:300px;top:300px"></div>
    <div class="pixelTree" style="left:1200px;top:500px"></div>
    <div class="pixelTree" style="left:500px;top:1100px"></div>
  </div>
</div>

<!-- Travel menu -->
<div id="travelOverlay">
  <div id="travelBox">
    <h2>Travel Station</h2>
    <p>Where do you want to go?</p>
    <button class="btnCute" onclick="switchWorld('cute')">🌸 Cute World</button>
    <button class="btnMagical" onclick="switchWorld('magical')">🔮 Magical World</button>
    <button class="btnCosmic" onclick="switchWorld('cosmic')">🌌 Cosmic World</button>
    <button class="btnPixel" onclick="switchWorld('pixel')">🟪 Pixel World</button>
    <button onclick="closeTravel()">Cancel</button>
  </div>
</div>

<script>
let currentWorld="cute";
let player=document.createElement("div");
player.id="player";
player.className="player cute";
let px=780,py=780;
let keys={};
let speed=4;

const worlds={
  cute:document.getElementById("cuteWorld"),
  magical:document.getElementById("magicalWorld"),
  cosmic:document.getElementById("cosmicWorld"),
  pixel:document.getElementById("pixelWorld")
};

function showWorld(name){
  currentWorld=name;
  for(let k in worlds)worlds[k].style.display="none";
  worlds[name].style.display="block";
  document.getElementById("worldLabel").textContent=
    name==="cute"?"Cute World":
    name==="magical"?"Magical World":
    name==="cosmic"?"Cosmic World":
    "Pixel World";

  // attach player
  worlds[name].appendChild(player);

  // style player per world
  player.className="player "+(
    name==="cute"?"cute":
    name==="magical"?"magical":
    name==="cosmic"?"cosmic":
    "pixel"
  );

  // reset position near center
  px=780;py=780;
  updatePlayerPos();

  // center scroll
  const vp=document.getElementById("viewport");
  vp.scrollLeft=px- vp.clientWidth/2;
  vp.scrollTop =py- vp.clientHeight/2;
}

function updatePlayerPos(){
  player.style.left=px+"px";
  player.style.top =py+"px";
}

document.addEventListener("keydown",e=>{keys[e.key]=true;});
document.addEventListener("keyup",e=>{keys[e.key]=false;});

function loop(){
  let wEl=worlds[currentWorld];
  if(!wEl){requestAnimationFrame(loop);return;}

  if(keys["ArrowUp"]||keys["w"])py-=speed;
  if(keys["ArrowDown"]||keys["s"])py+=speed;
  if(keys["ArrowLeft"]||keys["a"])px-=speed;
  if(keys["ArrowRight"]||keys["d"])px+=speed;

  // bounds
  let pw= currentWorld==="pixel"?32:(currentWorld==="magical"?36:(currentWorld==="cosmic"?38:40));
  let ph= currentWorld==="cute"||currentWorld==="magical"?48:pw;
  px=Math.max(0,Math.min(1600-pw,px));
  py=Math.max(0,Math.min(1600-ph,py));

  updatePlayerPos();
  checkStationCollision();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

function rect(el){
  let r=el.getBoundingClientRect();
  return {x:r.left+window.scrollX,y:r.top+window.scrollY,w:r.width,h:r.height};
}

function checkStationCollision(){
  let wEl=worlds[currentWorld];
  let station=wEl.querySelector(".station");
  if(!station)return;
  let sRect=rect(station);
  let pRect=rect(player);
  let overlap=!(pRect.x+pRect.w<sRect.x || pRect.x>sRect.x+sRect.w ||
                pRect.y+pRect.h<sRect.y || pRect.y>sRect.y+sRect.h);
  if(overlap) openTravel();
}

function openTravel(){
  document.getElementById("travelOverlay").style.display="flex";
}
function closeTravel(){
  document.getElementById("travelOverlay").style.display="none";
}

function switchWorld(name){
  closeTravel();
  showWorld(name);
}

showWorld("cute");
</script>
</body>
</html>
