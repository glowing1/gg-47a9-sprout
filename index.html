<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GlowGarden — Compact Everything</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: #050510;
    font-family: system-ui, sans-serif;
    color: #f5f5ff;
  }

  #topBar {
    height: 48px;
    background: linear-gradient(90deg,#151520,#1b1b2a);
    border-bottom: 1px solid #26263a;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 12px;
    font-size: 13px;
  }

  #worldName {
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  #worldDot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #ffb7c5;
    box-shadow: 0 0 8px #ffb7c5;
  }

  #themeButtons button {
    margin-left: 4px;
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.4);
    color: #f5f5ff;
    font-size: 11px;
    cursor: pointer;
  }

  #themeButtons button:hover {
    background: rgba(255,255,255,0.08);
  }

  #soundToggle {
    padding: 3px 8px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.4);
    cursor: pointer;
    font-size: 11px;
  }

  #main {
    position: relative;
    width: 100vw;
    height: calc(100vh - 48px);
    overflow: hidden;
  }

  #world {
    position: absolute;
    width: 2400px;
    height: 2400px;
    background: radial-gradient(circle at center,#1a1a2e,#050510);
    transition: background 0.4s;
  }

  /* Plaza */
  #plaza {
    position: absolute;
    left: 1100px;
    top: 1100px;
    width: 200px;
    height: 200px;
    background: radial-gradient(circle,#ffe3ec,#ff8fa3);
    border-radius: 40px;
    box-shadow: 0 0 40px #ff8fa3;
  }

  /* Avatar */
  #avatar {
    position: absolute;
    width: 40px;
    height: 40px;
    background: radial-gradient(circle,#ffb7c5,#ff6f91);
    border-radius: 50%;
    box-shadow: 0 0 12px #ff8fb0;
  }

  /* Garden */
  #garden {
    position: absolute;
    left: 1000px;
    top: 1350px;
    width: 256px;
    height: 256px;
    display: grid;
    grid-template-columns: repeat(4,64px);
    grid-template-rows: repeat(4,64px);
    gap: 4px;
  }

  .tile {
    width: 64px;
    height: 64px;
    background: #3b2a1a;
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.08);
  }

  .plant {
    position: absolute;
    left: 22px;
    top: 22px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
  }

  .stage1 { background:#7fd37f; box-shadow:0 0 8px #7fd37f; }
  .stage2 { background:#ffdf80; box-shadow:0 0 8px #ffdf80; }
  .stage3 { background:#ff8fa3; box-shadow:0 0 8px #ff8fa3; }
  .stage4 { background:#c9a7ff; box-shadow:0 0 8px #c9a7ff; }

  /* Stands */
  .stand {
    position: absolute;
    width: 140px;
    height: 100px;
    border-radius: 16px;
    box-shadow: 0 10px 22px rgba(0,0,0,0.6);
    cursor: pointer;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    font-size: 13px;
    color: #fff;
    font-weight: 600;
    padding-bottom: 6px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.6);
    transition: transform 0.2s, filter 0.2s;
  }

  .stand:hover {
    transform: translateY(-4px) scale(1.03);
    filter: brightness(1.08);
  }

  #standCute {
    left: 850px;
    top: 950px;
    background: linear-gradient(180deg,#ffe3ec,#ff8fa3);
  }

  #standMagic {
    left: 1250px;
    top: 950px;
    background: radial-gradient(circle,#f5ecff,#7f5fff);
  }

  #standCosmic {
    left: 850px;
    top: 750px;
    background: radial-gradient(circle,#f0fbff,#3a7bbf);
  }

  #standPixel {
    left: 1250px;
    top: 750px;
    background: repeating-linear-gradient(90deg,#fff2b3 0,#fff2b3 8px,#ffd966 8px,#ffd966 16px);
  }

  /* Side panel (tasks + decorations) */
  #sidePanel {
    position: absolute;
    right: 8px;
    top: 8px;
    width: 220px;
    height: calc(100% - 16px);
    background: rgba(10,10,20,0.9);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 8px 20px rgba(0,0,0,0.6);
    padding: 8px;
    font-size: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #tasks h3, #decorations h3 {
    margin: 4px 0;
    font-size: 13px;
  }

  #tasks ul {
    list-style: none;
    padding-left: 0;
  }

  #tasks li {
    margin-bottom: 4px;
    cursor: pointer;
  }

  #tasks li.done {
    text-decoration: line-through;
    color: #9fa3c0;
  }

  #decorations button {
    margin: 2px 0;
    width: 100%;
    padding: 4px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.4);
    color: #f5f5ff;
    cursor: pointer;
    font-size: 11px;
  }

  #decorations button:hover {
    background: rgba(255,255,255,0.08);
  }

  .decoration {
    position: absolute;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    pointer-events: none;
  }

  .dec-star { background: radial-gradient(circle,#fff,#ffd966); box-shadow:0 0 10px #ffd966; }
  .dec-flower { background: radial-gradient(circle,#fff,#ff8fa3); box-shadow:0 0 10px #ff8fa3; }
  .dec-orb { background: radial-gradient(circle,#fff,#7fd0ff); box-shadow:0 0 10px #7fd0ff; }
</style>
</head>
<body>

<div id="topBar">
  <div id="worldName">
    <div id="worldDot"></div>
    <span id="worldLabel">Cute World</span>
  </div>
  <div id="themeButtons">
    <button data-theme="cute">Cute</button>
    <button data-theme="magical">Magical</button>
    <button data-theme="cosmic">Cosmic</button>
    <button data-theme="pixel">Pixel</button>
  </div>
  <button id="soundToggle">Sound: Off</button>
</div>

<div id="main">
  <div id="world">
    <div id="plaza"></div>
    <div id="garden"></div>
    <div id="standCute" class="stand">Cute Stand</div>
    <div id="standMagic" class="stand">Magic Stand</div>
    <div id="standCosmic" class="stand">Cosmic Stand</div>
    <div id="standPixel" class="stand">Pixel Stand</div>
    <div id="avatar"></div>
  </div>

  <div id="sidePanel">
    <div id="tasks">
      <h3>Tasks</h3>
      <ul>
        <li data-id="plant3">Plant 3 seeds</li>
        <li data-id="visitCute">Visit Cute Stand</li>
        <li data-id="visitMagic">Visit Magic Stand</li>
      </ul>
    </div>
    <div id="decorations">
      <h3>Decorations</h3>
      <button data-dec="star">Place Star</button>
      <button data-dec="flower">Place Flower</button>
      <button data-dec="orb">Place Orb</button>
      <p style="margin-top:6px;font-size:11px;color:#b0b3d0;">
        Click in the world after choosing a decoration.
      </p>
    </div>
  </div>
</div>

<script>
/* -------- Avatar + Camera -------- */
const avatar = document.getElementById("avatar");
const world = document.getElementById("world");
let x = 1200, y = 1200;
const speed = 5;

function updateAvatar() {
  avatar.style.left = x + "px";
  avatar.style.top = y + "px";
  const cx = window.innerWidth / 2 - x - 20;
  const cy = (window.innerHeight - 48) / 2 - y - 20;
  world.style.transform = `translate(${cx}px, ${cy}px)`;
}

const keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

function gameLoop() {
  if (keys["ArrowUp"] || keys["w"]) y -= speed;
  if (keys["ArrowDown"] || keys["s"]) y += speed;
  if (keys["ArrowLeft"] || keys["a"]) x -= speed;
  if (keys["ArrowRight"] || keys["d"]) x += speed;
  updateAvatar();
  requestAnimationFrame(gameLoop);
}
updateAvatar();
gameLoop();

/* -------- Garden + Plant Growth -------- */
const garden = document.getElementById("garden");
let plantedCount = 0;

for (let i = 0; i < 16; i++) {
  const tile = document.createElement("div");
  tile.className = "tile";
  tile.dataset.stage = 0;

  tile.onclick = () => {
    let stage = Number(tile.dataset.stage);
    if (stage < 4) {
      stage++;
      if (stage === 1) plantedCount++;
      tile.dataset.stage = stage;
      tile.innerHTML = "";
      const plant = document.createElement("div");
      plant.className = "plant stage" + stage;
      tile.appendChild(plant);
      checkTasks();
      playChime();
    }
  };

  garden.appendChild(tile);
}

/* -------- Stands + Interactions -------- */
function standMessage(name) {
  alert("You interacted with the " + name + "!");
  if (name === "Cute Stand") markTaskDone("visitCute");
  if (name === "Magic Stand") markTaskDone("visitMagic");
}

document.getElementById("standCute").onclick = () => standMessage("Cute Stand");
document.getElementById("standMagic").onclick = () => standMessage("Magic Stand");
document.getElementById("standCosmic").onclick = () => standMessage("Cosmic Stand");
document.getElementById("standPixel").onclick = () => standMessage("Pixel Stand");

/* -------- Tasks -------- */
const taskList = document.querySelectorAll("#tasks li");

function markTaskDone(id) {
  taskList.forEach(li => {
    if (li.dataset.id === id) li.classList.add("done");
  });
}

function checkTasks() {
  if (plantedCount >= 3) markTaskDone("plant3");
}

/* -------- Decorations -------- */
let currentDecoration = null;

document.querySelectorAll("#decorations button").forEach(btn => {
  btn.addEventListener("click", () => {
    currentDecoration = btn.dataset.dec;
  });
});

world.addEventListener("click", e => {
  if (!currentDecoration) return;
  const rect = world.getBoundingClientRect();
  const dx = e.clientX - rect.left;
  const dy = e.clientY - rect.top;
  const dec = document.createElement("div");
  dec.classList.add("decoration");
  if (currentDecoration === "star") dec.classList.add("dec-star");
  if (currentDecoration === "flower") dec.classList.add("dec-flower");
  if (currentDecoration === "orb") dec.classList.add("dec-orb");
  dec.style.left = (dx - 12) + "px";
  dec.style.top = (dy - 12) + "px";
  world.appendChild(dec);
  playChime();
});

/* -------- World Themes -------- */
const worldLabel = document.getElementById("worldLabel");
const worldDot = document.getElementById("worldDot");

function setTheme(theme) {
  if (theme === "cute") {
    world.style.background = "radial-gradient(circle at center,#2a1a2e,#050510)";
    worldDot.style.background = "#ffb7c5";
    worldDot.style.boxShadow = "0 0 8px #ffb7c5";
    worldLabel.textContent = "Cute World";
  } else if (theme === "magical") {
    world.style.background = "radial-gradient(circle at center,#2b1b4a,#0b0618)";
    worldDot.style.background = "#c9a7ff";
    worldDot.style.boxShadow = "0 0 8px #c9a7ff";
    worldLabel.textContent = "Magical World";
  } else if (theme === "cosmic") {
    world.style.background = "radial-gradient(circle at center,#163a5c,#02040a)";
    worldDot.style.background = "#7fd0ff";
    worldDot.style.boxShadow = "0 0 8px #7fd0ff";
    worldLabel.textContent = "Cosmic World";
  } else if (theme === "pixel") {
    world.style.background = "repeating-linear-gradient(45deg,#1f1f1f 0,#1f1f1f 8px,#151515 8px,#151515 16px)";
    worldDot.style.background = "#ffd966";
    worldDot.style.boxShadow = "0 0 8px #ffd966";
    worldLabel.textContent = "Pixel World";
  }
}

document.querySelectorAll("#themeButtons button").forEach(btn => {
  btn.addEventListener("click", () => setTheme(btn.dataset.theme));
});

setTheme("cute");

/* -------- Sound (simple chime) -------- */
let soundOn = false;
const soundToggle = document.getElementById("soundToggle");

soundToggle.onclick = () => {
  soundOn = !soundOn;
  soundToggle.textContent = "Sound: " + (soundOn ? "On" : "Off");
};

function playChime() {
  if (!soundOn) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.25);
  } catch (e) {
    // ignore if AudioContext not available
  }
}
</script>

</body>
</html>
